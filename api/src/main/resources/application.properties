spring.application.name=api


# Database
spring.datasource.url=jdbc:mysql://localhost:3306/vottech
spring.datasource.username=vottech
spring.datasource.password=1234
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.testWhileIdle=true
spring.datasource.validationQuery=SELECT 1
spring.datasource.timeBetweenEvictionRunsMillis=3600000

# JPA
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
#Nao mudar o ddl-auto
spring.jpa.hibernate.naming-strategy=org.hibernate.cfg.ImprovedNamingStrategy 
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.database-plataform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.jadira.usertype.autoRegisterUserTypes=true

spring.main.allow-bean-definition-overriding=true

# Server
server.port=8080

# Swagger
swagger.api.title=Vottech Spring api
swagger.api.discription=API made to vote on a techinology event
swagger.api.version=1.0
swagger.api.contact.name=Spring API
swagger.api.contact.email=lkevinvinagre@hotmail.com

# CORS
cors.allowed.origins=*
cors.allowed.methods=GET, POST, PUT, DELETE, OPTIONS
cors.allowed.headers=Authorization, Content-Type
cors.exposed.headers=Authorization
cors.allow.credentials=true
cors.max.age=3600

#Security
spring.security.user.name=admin
spring.security.user.password=admin