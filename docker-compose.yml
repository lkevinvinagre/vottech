services:
  #Data Base
  db:
    image: postgres:latest
    container_name: database
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: vot2025
      MYSQL_DATABASE: vottech
      MYSQL_USER: votuser
      MYSQL_PASSWORD: ATL2sZXiBoQ7CoFHXhePlSOTZWJRqdAH
    ports:
      - "5432:5432"
    volumes:
      - postdata:/var/lib/mysql
    networks:
      - vottechNet

#Web Application
  api:
    build: ./api
    container_name: api
    restart: always
    environment:
      DATABASE_URL: jdbc:mysql://db:3306/vottech
      DATABASE_USER: votuser
      DATABASE_PASSWORD: votuser123
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - vottechNet

#Datas
volumes:
  postdata:

#Networks
networks:
  vottechNet:
    driver: bridge